    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Grapho",
        "url": "https://grapho.marmota.dev.br/",
        "description": "Digite qualquer texto ou emoji e pinte arrastando o mouse como um pincel. De graça, direto no navegador.",
        "applicationCategory": "DesignApplication",
        "operatingSystem": "Web",
        "softwareVersion": "1.0.0",
        "datePublished": "2026-03-17",
        "screenshot": "https://grapho.marmota.dev.br/docs/bmo.png",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "BRL" },

        "browserRequirements": "Requires JavaScript. Requires HTML5 Canvas.",

<body>
    <noscript>
        <div style="padding:2rem;text-align:center;font-family:sans-serif;">
            <h1>Grapho</h1>
            <p>Desenhe com letras, emojis e símbolos livremente no canvas. De graça, direto no navegador.</p>
            <p>Este app precisa de JavaScript para funcionar.</p>
        </div>
    </noscript>
    <div class="app-container">
        <div id="loading-overlay" class="loading-overlay" style="display: none;">
            <div class="loading-content">
                <div class="loading-spinner"></div>
                <span data-i18n="loading.restoring">Restaurando...</span>
            </div>
        </div>
        <div id="canvas-container"></div>

        <div class="dock-wrapper dock-wrapper-left" id="left-dock-wrapper">
            <div id="color-dock" class="hidden">
                <button class="dock-collapse-btn" id="color-dock-collapse" data-i18n-title="docks.collapse">
                    <i data-lucide="panel-left-close"></i>
                </button>
                <div class="color-dock-section">
                    <label id="color-dock-label">Texto</label>
                    <div class="color-row">
                        <div class="dock-color-swatch" id="dock-color-swatch"></div>
                        <input type="color" id="native-color-picker" value="#000000">
                        <button class="eyedropper-btn" id="active-eyedropper">
                            <i data-lucide="pipette"></i>
                        </button>
                    </div>
                    <input type="text" id="active-color-input" value="#000000">
                </div>
                <div class="color-dock-section">
                    <label data-i18n="colorDock.history">Recentes</label>
                    <div id="color-history" class="color-history-grid"></div>
                </div>
            </div>

            <div id="symbol-dock" class="hidden">
                <button class="dock-collapse-btn" id="symbol-dock-collapse" data-i18n-title="docks.collapse">
                    <i data-lucide="panel-left-close"></i>
                </button>
                <div class="symbol-dock-header">
                    <div class="symbol-dock-tabs" id="symbol-tabs">
                        <button class="symbol-dock-tab active" data-tab="symbols">
                            <i data-lucide="shapes"></i>
                        </button>
                        <button class="symbol-dock-tab" data-tab="emojis">
                            <i data-lucide="smile"></i>
                        </button>
                    </div>
                </div>
                <div class="symbol-search-wrapper">
                    <i data-lucide="search"></i>
                    <input type="text" id="symbol-search" data-i18n-placeholder="symbolDock.search" autocomplete="off" spellcheck="false">
                </div>
                <div class="symbol-content" id="symbol-content"></div>
                <div class="symbol-history-section">
                    <label data-i18n="symbolDock.recent">Recentes</label>
                    <div id="symbol-history" class="symbol-history-grid"></div>
                </div>
            </div>

            <div class="dock-toggle-group">
                <button class="dock-toggle" id="color-dock-toggle" data-i18n-title="docks.colors">
                    <i data-lucide="palette"></i>
                </button>
                <button class="dock-toggle" id="symbol-dock-toggle" data-i18n-title="docks.symbols">
                    <i data-lucide="shapes"></i>
                </button>
            </div>
        </div>

        <div class="dock-wrapper dock-wrapper-right" id="layer-dock-wrapper">
            <div id="layer-dock">
                <button class="dock-collapse-btn" id="layer-dock-collapse" data-i18n-title="docks.collapse">
                    <i data-lucide="panel-right-close"></i>
                </button>
                <div class="layer-dock-header">
                    <span data-i18n="layers.title">Camadas</span>
                    <div class="layer-dock-actions">
                        <div class="layer-action-grid">
                            <button class="layer-action-btn" id="layer-add-btn" title="Adicionar">
                                <i data-lucide="plus"></i>
                            </button>
                            <button class="layer-action-btn danger" id="layer-remove-btn" disabled>
                                <i data-lucide="trash-2"></i>
                            </button>
                            <button class="layer-action-btn" id="layer-up-btn" disabled>
                                <i data-lucide="chevron-up"></i>
                            </button>
                            <button class="layer-action-btn" id="layer-down-btn" disabled>
                                <i data-lucide="chevron-down"></i>
                            </button>
                        </div>
                        <div class="layer-opacity-control">
                            <i data-lucide="sun"></i>
                            <input type="range" id="layer-opacity" min="0" max="100" value="100">
                            <span id="layer-opacity-value">100%</span>
                        </div>
                    </div>
                </div>
                <div class="layer-list" id="layer-list"></div>
            </div>
            <button class="dock-toggle active" id="layer-dock-toggle">
                <i data-lucide="layers"></i>
            </button>
        </div>

        <div id="lang-switcher">
            <button class="flag-button active" data-locale="pt-BR"
                    onclick="window.i18nModule?.switchLanguage('pt-BR')">🇧🇷</button>
            <button class="flag-button" data-locale="en-US"
                    onclick="window.i18nModule?.switchLanguage('en-US')">🇺🇸</button>
            <a class="github-link" href="https://github.com/gustavosilveiragss/grapho" target="_blank" rel="noopener noreferrer" title="GitHub">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
            </a>
        </div>

        <div id="nav-hint">
            <i data-lucide="mouse-pointer"></i>
            <div class="hint-lines">
                <span data-i18n="hints.zoom"></span>
                <span data-i18n="hints.pan"></span>
                <span class="hint-rotate-row">
                    <span data-i18n="hints.rotate"></span>
                    <button id="rotation-indicator" title="Reset rotation">
                        <span id="rotation-value">0°</span>
                    </button>
                </span>
            </div>
        </div>

        <div id="toolbar">
            <button class="toolbar-collapse-btn" id="toolbar-collapse">
                <i data-lucide="chevron-down"></i>
            </button>
            <div class="toolbar-content">
                <div class="tool-group text-group">
                    <textarea id="paint-text" rows="3"
                              data-i18n-placeholder="toolbar.placeholder"
                              spellcheck="false">Lorem ipsum dolor sit amet, consectetur adipiscing elit. </textarea>
                </div>

                <div class="toolbar-controls">
                    <div class="toolbar-row toolbar-row-top">
                        <div class="tool-group font-group">
                            <i data-lucide="type"></i>
                            <div class="font-selector">
                                <input type="text" id="font-search"
                                       data-i18n-placeholder="toolbar.font"
                                       autocomplete="off" spellcheck="false">
                                <div id="font-dropdown" class="font-dropdown"></div>
                            </div>
                        </div>

                        <div class="tool-group color-swatches">
                            <div class="toolbar-swatch" id="text-color-swatch" title="Cor do texto">
                                <i data-lucide="type"></i>
                            </div>
                            <div class="toolbar-swatch" id="bg-color-swatch" title="Cor de fundo">
                                <i data-lucide="paint-bucket"></i>
                            </div>
                        </div>

                        <div class="tool-group tools-group">
                            <button class="dock-button toggle-btn active" id="continue-btn"
                                    onclick="window.controlsModule?.toggleContinue()">
                                <i data-lucide="repeat"></i>
                                <span data-i18n="toolbar.continue"></span>
                            </button>
                            <button class="dock-button toggle-btn" id="eraser-btn"
                                    onclick="window.controlsModule?.toggleEraser()">
                                <i data-lucide="eraser"></i>
                                <span data-i18n="toolbar.eraser"></span>
                            </button>
                        </div>

                        <div class="tool-group actions">
                            <button class="dock-button" id="undo-btn" onclick="window.historyModule?.undo()">
                                <i data-lucide="undo-2"></i>
                                <span data-i18n="toolbar.undo"></span>
                            </button>
                            <button class="dock-button danger" id="clear-btn" onclick="window.historyModule?.clear()">
                                <i data-lucide="trash-2"></i>
                                <span data-i18n="toolbar.clear"></span>
                            </button>
                            <button class="dock-button" id="save-btn" onclick="window.exportModule?.savePNG()">
                                <i data-lucide="download"></i>
                                <span data-i18n="toolbar.save"></span>
                            </button>
                        </div>
                    </div>

                    <div class="toolbar-row toolbar-row-sliders">
                        <div class="slider-input slider-large" data-field="font-size">
                            <i data-lucide="a-large-small"></i>
                            <label for="font-size" data-i18n="toolbar.size"></label>
                            <div class="slider-track">
                                <input type="range" id="font-size" min="8" max="120" value="32" step="1">
                            </div>
                            <button class="slider-value" id="font-size-value">32</button>
                            <input type="number" class="slider-edit" id="font-size-edit" min="8" max="120" step="1">
                        </div>

                        <div class="slider-input slider-large" data-field="spacing">
                            <i data-lucide="space"></i>
                            <label for="spacing" data-i18n="toolbar.spacing"></label>
                            <div class="slider-track">
                                <input type="range" id="spacing" min="0" max="3" value="1" step="0.1">
                            </div>
                            <button class="slider-value" id="spacing-value">1.0</button>
                            <input type="number" class="slider-edit" id="spacing-edit" min="0" max="3" step="0.1">
                        </div>

                        <div class="slider-input slider-large" data-field="stroke-weight">
                            <i data-lucide="pen-line"></i>
                            <label for="stroke-weight" data-i18n="toolbar.stroke"></label>
                            <div class="slider-track">
                                <input type="range" id="stroke-weight" min="0" max="5" value="0" step="0.5">
                            </div>
                            <button class="slider-value" id="stroke-weight-value">0</button>
                            <input type="number" class="slider-edit" id="stroke-weight-edit" min="0" max="5" step="0.5">
                        </div>

                        <div class="slider-input slider-large" id="eraser-options" data-field="eraser-radius" style="display: none;">
                            <i data-lucide="circle"></i>
                            <label for="eraser-radius" data-i18n="toolbar.eraserRadius"></label>
                            <div class="slider-track">
                                <input type="range" id="eraser-radius" min="8" max="100" value="20" step="2">
                            </div>
                            <button class="slider-value" id="eraser-radius-value">20</button>
                            <input type="number" class="slider-edit" id="eraser-radius-edit" min="8" max="100" step="2">
                        </div>
                    </div>

                    <div class="toolbar-row toolbar-row-pressure" id="pressure-controls" style="display: none;">
                        <i data-lucide="pen-tool"></i>
                        <button class="dock-button toggle-btn" id="pressure-btn"
                                onclick="window.controlsModule?.togglePressure()">
                            <span data-i18n="toolbar.pressure">Pressure</span>
                        </button>
                        <div class="slider-input slider-large" data-field="pressure-min">
                            <label>Min</label>
                            <div class="slider-track">
                                <input type="range" id="pressure-min" min="0.1" max="1" value="0.5" step="0.1">
                            </div>
                            <button class="slider-value" id="pressure-min-value">0.5</button>
                            <input type="number" class="slider-edit" id="pressure-min-edit" min="0.1" max="1" step="0.1">
                        </div>
                        <div class="slider-input slider-large" data-field="pressure-max">
                            <label>Max</label>
                            <div class="slider-track">
                                <input type="range" id="pressure-max" min="1" max="3" value="2" step="0.1">
                            </div>
                            <button class="slider-value" id="pressure-max-value">2.0</button>
                            <input type="number" class="slider-edit" id="pressure-max-edit" min="1" max="3" step="0.1">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button class="toolbar-expand-btn" id="toolbar-expand" style="display: none;">
            <i data-lucide="chevron-up"></i>
        </button>

        <div class="dock-fab-container" id="dock-fabs">
            <button class="dock-fab" id="fab-color" aria-label="Cores">
                <div class="fab-swatch" id="fab-color-swatch"></div>
            </button>
            <button class="dock-fab" id="fab-symbols" aria-label="Símbolos">
                <i data-lucide="shapes"></i>
            </button>
            <button class="dock-fab" id="fab-layers" aria-label="Camadas">
                <i data-lucide="layers"></i>
            </button>
        </div>

        <div class="mobile-drawer-backdrop" id="drawer-backdrop"></div>
        <div class="mobile-drawer" id="mobile-drawer">
            <div class="drawer-handle"><span class="handle-bar"></span></div>
            <div class="drawer-header">
                <h3 class="drawer-title"></h3>
                <button class="drawer-close" id="drawer-close" aria-label="Fechar">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="drawer-content" id="drawer-content"></div>
        </div>

        <div id="dialog-overlay" class="dialog-overlay" style="display: none;">
            <div class="dialog-content">
                <h3 id="dialog-title"></h3>
                <p id="dialog-message"></p>
                <div id="dialog-custom-content" class="dialog-instructions" style="display: none;"></div>
                <div class="dialog-buttons">
                    <button class="dock-button" id="dialog-cancel" onclick="window.dialogModule?.handleCancel()">
                        <span data-i18n="dialog.cancel">Cancelar</span>
                    </button>
                    <button class="dock-button primary" id="dialog-confirm" onclick="window.dialogModule?.handleConfirm()">
                        <span data-i18n="dialog.ok">OK</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="./src/app.js"></script>
